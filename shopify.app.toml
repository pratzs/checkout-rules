# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "f91ada05117781716bca25dfa1f46351"
name = "checkout-rules"
application_url = "https://checkout-rules-aoxi.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = ""

[access_scopes]
scopes = "read_delivery_customizations,write_delivery_customizations,read_payment_customizations,write_payment_customizations,read_shipping,read_customers,write_customers,read_orders,write_orders,read_companies,write_companies,read_themes,write_themes"

[auth]
redirect_urls = [
  "https://checkout-rules-aoxi.onrender.com/auth/callback",
  "https://checkout-rules-aoxi.onrender.com/auth/shopify/callback",
  "https://checkout-rules-aoxi.onrender.com/api/auth/callback"
]

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = ["customers/update", "customers/create"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["orders/create"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["themes/publish"]
  uri = "/webhooks"
