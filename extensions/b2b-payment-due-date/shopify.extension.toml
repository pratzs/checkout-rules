api_version = "2025-07"

[[extensions]]
uid = "4f6f93df-9e9b-b4b6-b000-11bb658473c5cfc1531e"
type = "ui_extension"
name = "B2B Payment Due Date"
handle = "b2b-payment-due-date"

  [[extensions.targeting]]
  module = "./src/index.js"
  target = "purchase.checkout.actions.render-before"

  # Grant read access to the customer groups metafield so we can detect
  # "overdue" tag status at checkout without a separate server round-trip.
  [[extensions.metafields]]
  namespace = "$app:checkout-rules"
  key = "groups"
