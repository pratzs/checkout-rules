services:
  - type: web
    name: checkout-rules
    env: node
    plan: free
    rootDir: web
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_API_KEY
        value: f91ada05117781716bca25dfa1f46351
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SCOPES
        value: "read_delivery_customizations,write_delivery_customizations,read_payment_customizations,write_payment_customizations,read_shipping,read_customers,write_customers"
      - key: DELIVERY_FUNCTION_UID
        value: "019cd4c8-52c9-7d09-9afb-271a31ba13b7"
      - key: PAYMENT_FUNCTION_UID
        value: "019cd4c8-52c9-745a-944e-33cd8e4050ff"
