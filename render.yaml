services:
  - type: web
    name: checkout-rules
    env: node
    plan: free
    rootDir: web
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_API_KEY
        value: f91ada05117781716bca25dfa1f46351
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SCOPES
        value: "read_delivery_customizations,write_delivery_customizations,read_payment_customizations,write_payment_customizations,read_payment_gateways,read_shipping,read_customers,write_customers"
      - key: DELIVERY_FUNCTION_UID
        value: "f500c847-9b31-c041-83e9-dd7be2d62cd831f00ec1"
      - key: PAYMENT_FUNCTION_UID
        value: "13f4898e-7ecb-993e-066f-6483556f095638b4eb7c"
